<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flying Leader</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: manipulation; }
        #player { 
            width: 80px; height: 80px; 
            position: absolute; left: 50px; top: 50%;
            /* Matches your GitHub file name */
            background: url('char.png.PNG') no-repeat center/contain;
            z-index: 10;
        }
        .enemy { width: 75px; position: absolute; right: -100px; background-size: contain; background-repeat: no-repeat; }
        /* Matches your GitHub file names */
        .top { background-image: url('enemy1.png.PNG'); top: 0; }
        .bottom { background-image: url('enemy2.png.PNG'); bottom: 0; }
    </style>
</head>
<body onclick="jump()">
    <div id="player"></div>
    <audio id="m" src="music.mp3.mp3" loop></audio>
    <script>
        const p = document.getElementById('player'), m = document.getElementById('m');
        let y = 200, v = 0, active = false;

        function jump() { 
            v = -7; 
            if(!active){ active = true; m.play(); spawn(); } 
        }

        setInterval(() => {
            if(!active) return;
            v += 0.4; y += v;
            p.style.top = y + "px";
            if(y > window.innerHeight || y < -50) location.reload();
        }, 20);

        function spawn() {
            if(!active) return;
            let gap = 250, h = Math.random() * (window.innerHeight - gap - 100) + 50;
            let t = document.createElement('div'), b = document.createElement('div');
            t.className = 'enemy top'; t.style.height = h + "px";
            b.className = 'enemy bottom'; b.style.height = (window.innerHeight - h - gap) + "px";
            document.body.appendChild(t); document.body.appendChild(b);

            let x = window.innerWidth;
            let move = setInterval(() => {
                x -= 5; t.style.left = x + "px"; b.style.left = x + "px";
                let pr = p.getBoundingClientRect(), tr = t.getBoundingClientRect(), br = b.getBoundingClientRect();

                // Collision Detection
                if ((pr.right > tr.left + 5 && pr.left < tr.right - 5 && pr.top < tr.bottom - 5) || 
                    (pr.right > br.left + 5 && pr.left < br.right - 5 && pr.bottom > br.top + 5)) {
                    location.reload();
                }
                if(x < -100) { clearInterval(move); t.remove(); b.remove(); }
            }, 20);
            setTimeout(spawn, 2000);
        }
    </script>
</body>
</html>
